<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ivan Khomych</title>
<meta name="description" content="Ivan Khomych — Python Developer.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230c1116'/%3E%3Crect x='1' y='1' width='30' height='30' rx='6' fill='none' stroke='%23232c36' stroke-width='1'/%3E%3Cpath d='M9 9 L18 16 L9 23' fill='none' stroke='%23e0a458' stroke-width='3.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Crect x='20' y='19.5' width='7' height='3.6' rx='1' fill='%238fb8b0'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c1116;
    --panel-line: #232c36;
    --text: #e8e4da;
    --text-dim: #6b7480;
    --amber: #e0a458;
    --teal: #8fb8b0;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2efe8;
      --panel-line: #d8d3c5;
      --text: #1c1f24;
      --text-dim: #5b6472;
      --amber: #b8722c;
      --teal: #2f7a70;
    }
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; margin: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  main {
    width: 100%;
    max-width: 440px;
    border: 1px solid var(--panel-line);
    border-radius: 10px;
    overflow: hidden;
    animation: rise 0.4s ease both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--panel-line);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.02em;
    color: var(--text-dim);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
  }

  .status-bar .code { color: var(--amber); }

  .body-panel {
    padding: 36px 20px 28px;
  }

  .name {
    font-size: 1.9rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }

  .cursor {
    display: inline-block;
    color: var(--amber);
    animation: blink 1.1s steps(1) infinite;
  }

  @media (prefers-reduced-motion: reduce) {
    .cursor { animation: none; }
    main { animation: none; }
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  .role {
    font-size: 0.98rem;
    color: var(--text-dim);
    margin: 0 0 32px;
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.02em;
    margin: 0 0 4px;
  }

  ul.links {
    list-style: none;
    margin: 0;
    padding: 0;
    border-top: 1px solid var(--panel-line);
  }

  ul.links li { border-bottom: 1px solid var(--panel-line); }

  ul.links a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 2px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.98rem;
    transition: color 0.15s ease;
  }

  ul.links a:hover,
  ul.links a:focus-visible { color: var(--teal); }

  ul.links a:hover .arrow,
  ul.links a:focus-visible .arrow {
    transform: translateX(2px);
    opacity: 1;
  }

  ul.links a:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 2px;
    border-radius: 4px;
  }

  .arrow {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--teal);
    opacity: 0;
    transform: translateX(-2px);
    transition: all 0.15s ease;
  }

  footer {
    padding: 14px 20px;
    border-top: 1px solid var(--panel-line);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    opacity: 0.7;
  }
</style>
</head>
<body>
<main>

    <span class="status-dot" aria-hidden="true"></span>
    <span><span class="code">HTTP/1.1 200 OK</span> · Host: ivankhomych.com</span>
  </div>

  <div class="body-panel">
    <h1 class="name">Ivan Khomych<span class="cursor" aria-hidden="true">_</span></h1>
    <p class="role">Python Developer</p>

    <p class="section-label">// elsewhere</p>
    <ul class="links">
      <li><a href="https://github.com/Khomychh" target="_blank" rel="noopener">GitHub <span class="arrow">→</span></a></li>
      <li><a href="https://www.linkedin.com/in/ivan-khomych-747418337/" target="_blank" rel="noopener">LinkedIn <span class="arrow">→</span></a></li>
      <li><a href="https://t.me/Ivan_Khomych" target="_blank" rel="noopener">Telegram <span class="arrow">→</span></a></li>
      <li><a href="https://instagram.com/ivan.khomych" target="_blank" rel="noopener">Instagram <span class="arrow">→</span></a></li>
      <li><a href="mailto:ivan.khomych@gmail.com">Email <span class="arrow">→</span></a></li>
    </ul>
  </div>

  <footer>ivankhomych.com</footer>
</main>
</body>
</html>
